name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build release assets
        shell: pwsh
        run: .\publish.ps1 -Version "${{ github.ref_name }}" -Mode all

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"

          $releaseExists = $false
          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = "Continue"
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = $previousErrorActionPreference

          if ($releaseExists) {
            gh release upload $env:RELEASE_TAG artifacts\*.zip --clobber --repo $env:GITHUB_REPOSITORY
          }
          else {
            gh release create $env:RELEASE_TAG artifacts\*.zip `
              --repo $env:GITHUB_REPOSITORY `
              --title "ServerPing $env:RELEASE_TAG" `
              --generate-notes
          }
